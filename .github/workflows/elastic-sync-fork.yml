name: elastic-sync-fork

on:
  workflow_dispatch:
  schedule:
    - cron: "27 12 * * 1-5" # Run at 12:27 UTC every day from Monday to Friday.

permissions:
  contents: read

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Synchronize fork
        run: gh repo sync "$REPOSITORY" -b main --force
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}

  sync-tags:
    runs-on: ubuntu-latest
    needs: sync-branches
    permissions:
      id-token: write
      contents: write
    env:
      UPSTREAM_REPO: https://github.com/open-telemetry/opentelemetry-collector-contrib.git
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.fetch-token.outputs.token }}

      - name: Fetch and push upstream tags
        run: |
          # Add upstream remote if it doesn't exist
          git remote get-url upstream || git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream --tags
          # Push tags without force to preserve locally modified tags
          # If a tag already exists with different content, the push will fail
          # This is intentional to prevent accidental overwrites
          if ! git push origin --tags 2>&1 | tee /tmp/push-output.txt; then
            echo "::warning::Some tags failed to push. This may indicate tags that differ between fork and upstream."
            echo "::warning::Review the tags and manually force-push if needed: git push origin --tags --force"
            grep -i "rejected" /tmp/push-output.txt || true
            exit 0  # Don't fail the workflow, just warn
          fi
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
