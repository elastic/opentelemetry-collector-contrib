name: elastic-sync-fork

on:
  workflow_dispatch:
  schedule:
    - cron: "27 12 * * 1-5" # Run at 12:27 UTC every day from Monday to Friday.

permissions:
  contents: read

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Synchronize fork
        run: gh repo sync "$REPOSITORY" -b main --force
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}

  sync-tags:
    runs-on: ubuntu-latest
    needs: sync-branches
    permissions:
      id-token: write
      contents: write
    env:
      UPSTREAM_REPO: https://github.com/open-telemetry/opentelemetry-collector-contrib.git
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.fetch-token.outputs.token }}

      - name: Fetch and push upstream tags
        run: |
          # Add upstream remote if it doesn't exist
          if ! git remote get-url upstream 2>/dev/null; then
            git remote add upstream "$UPSTREAM_REPO"
            echo "Added upstream remote"
          fi
          git fetch upstream --tags
          # Push tags without force to preserve locally modified tags
          # Tag conflicts are allowed to continue (with warnings) to enable automated syncing
          # while preventing accidental overwrites of tags that may have been modified locally
          if ! git push origin --tags 2>&1 | tee /tmp/push-output.txt; then
            if grep -qE "(rejected|non-fast-forward)" /tmp/push-output.txt; then
              echo "::warning::Some tags were rejected due to conflicts between fork and upstream."
              echo "::warning::This prevents accidental overwrites of locally modified tags."
              echo "::warning::This is expected behavior and allows automated syncing to continue."
              echo "::warning::Review the tags and manually force-push if needed: git push origin --tags --force"
              exit 0  # Don't fail the workflow for tag conflicts
            else
              echo "::error::Tag push failed due to an unexpected error (not a conflict)"
              cat /tmp/push-output.txt
              exit 1  # Fail for other errors like auth or network issues
            fi
          fi
