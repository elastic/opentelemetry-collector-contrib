name: elastic-sync-fork

on:
  workflow_dispatch:
  schedule:
    - cron: "27 12 * * 1-5" # Run at 12:27 UTC every day from Monday to Friday.

permissions:
  contents: read

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Synchronize fork
        run: gh repo sync "$REPOSITORY" -b main --force
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}

  sync-tags:
    runs-on: ubuntu-latest
    needs: sync-branches
    permissions:
      id-token: write
      contents: write
    env:
      UPSTREAM_REPO: https://github.com/open-telemetry/opentelemetry-collector-contrib.git
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.fetch-token.outputs.token }}

      - name: Fetch and push upstream tags
        run: |
          # Add upstream remote if it doesn't exist
          git remote get-url upstream || git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream --tags
          # Push tags without force to avoid overwriting modified tags
          git push origin --tags
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
