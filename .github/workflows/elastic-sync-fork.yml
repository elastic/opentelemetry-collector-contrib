name: elastic-sync-fork

on:
  workflow_dispatch:
  schedule:
    - cron: "27 12 * * 1-5" # Run at 12:27 UTC every day from Monday to Friday.

permissions:
  contents: read

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Synchronize fork
        run: gh repo sync "$REPOSITORY" -b main --force
        env:
          GITHUB_TOKEN: ${{ steps.fetch-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}

  sync-tags:
    runs-on: ubuntu-latest
    needs: sync-branches
    permissions:
      id-token: write
      contents: write
    env:
      UPSTREAM_REPO: https://github.com/open-telemetry/opentelemetry-collector-contrib.git
    steps:
      - uses: elastic/oblt-actions/github/create-token@v1
        id: fetch-token

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          token: ${{ steps.fetch-token.outputs.token }}

      - name: Fetch and push upstream tags
        run: |
          # Add upstream remote (fresh checkout only has origin by default)
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream --tags
          # Push only release tags (vX.Y.Z format) that are new in upstream and do not exist in origin.
          origin_tags_file=$(mktemp)
          upstream_tags_file=$(mktemp)
          trap 'rm -f "$origin_tags_file" "$upstream_tags_file"' EXIT

          git ls-remote --tags --refs origin | sed 's#.*refs/tags/##' > "$origin_tags_file"
          git ls-remote --tags --refs upstream | sed 's#.*refs/tags/##' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' > "$upstream_tags_file" || true

          pushed_count=0
          skipped_count=0
          unexpected_failure=0

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            if grep -Fxq "$tag" "$origin_tags_file"; then
              echo "Skipping existing tag on origin: $tag"
              skipped_count=$((skipped_count + 1))
              continue
            fi

            echo "Pushing tag: $tag"

            tag_output=$(mktemp)
            if git push origin "refs/tags/$tag:refs/tags/$tag" > "$tag_output" 2>&1; then
              cat "$tag_output"
              pushed_count=$((pushed_count + 1))
            else
              cat "$tag_output"
              echo "::error::Unexpected error while pushing tag: $tag"
              unexpected_failure=1
            fi
            rm -f "$tag_output"
          done < "$upstream_tags_file"

          echo "Pushed new tags: $pushed_count"
          echo "Skipped existing tags: $skipped_count"

          if [ "$unexpected_failure" -ne 0 ]; then
            exit 1
          fi
